name: Daily Data Refresh
on:
  schedule:
    - cron: '15 3 * * *' # 09:15 IST (UTC+5:30)
  workflow_dispatch: # Allows manual trigger from the UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt --timeout 120 --retries 5 --index-url https://pypi.org/simple || pip install -r requirements.txt
          
      - name: Run Ingestion
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'all-MiniLM-L6-v2' }}
          CHROMA_COLLECTION: groww_mf_chunks_v4
        run: python backend/phase-1-scheduler-service/src/scheduler.py
