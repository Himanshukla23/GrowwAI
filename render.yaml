services:
  - type: web
    name: groww-assist-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free # Change to 'starter' if you need more RAM for embeddings
    region: singapore # Closest to India for Groww data
    envVars:
      - key: PORT
        value: 8000
      - fromGroup: groww-secrets # You can create a secret group on Render
      - key: PYTHONPATH
        value: /app
      - key: CHROMA_API_KEY
        sync: false # Set this in the Render UI
      - key: GROQ_API_KEY
        sync: false # Set this in the Render UI
      - key: CHROMA_TENANT
        sync: false
      - key: CHROMA_DATABASE
        sync: false
      - key: EMBEDDING_MODEL
        value: "BAAI/bge-base-en-v1.5"
